<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, minimum-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Roboto:wght@100;300;400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="contact-style.css" />
    <title>WebsiteMakr</title>
  </head>
  <body>
    <nav>
      <div class="logo">
        <a href="index.html"
          ><img src="./resources/images/Logo_black_transparent.png" alt=""
        /></a>
      </div>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="#">About</a></li>
        <li><a href="#">Projects</a></li>
        <li><a href="contact.html" class="active">Contact</a></li>
      </ul>

      <div class="burger">
        <div class="line1"></div>
        <div class="line2"></div>
        <div class="line3"></div>
      </div>
    </nav>
    <main class="contact">
      <div class="contact-content">
        <div class="text-content">
          <h1>Ready to <span>work with us?</span></h1>
          <p>
            Provide us with some information on your vision and we will get back
            to in a few hours, we promise.
          </p>
        </div>

        <div class="form-content">
          <form class="contact-form">
            <input type="text" placeholder="Name*" />
            <input type="text" placeholder="Company*" />
            <input type="text" placeholder="Email*" />
            <textarea placeholder="Project Details*"></textarea>
            <button>Submit</button>
          </form>
        </div>
      </div>
    </main>
    <script src="app.js"></script>
  </body>
</html>
